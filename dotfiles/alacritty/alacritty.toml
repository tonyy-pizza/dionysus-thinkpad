# ─────────────────────────────────────────────────────────────────────────
#  Dionysus — ThinkPad X1 Carbon Gen 2 adaptation
#  Nord-inspired, neon-accent terminal theme
#  Font changed to JetBrainsMono Nerd Font (pre-installed)
#  vers. 1.0.0
# ─────────────────────────────────────────────────────────────────────────

# ── Cursor & Selection Colours ───────────────────────────────────────────
[colors.cursor]
cursor = "#528bff"
text   = "#9cdef2"

[colors.selection]
text       = "#9cdef2"
background = "#3e4451"

# ── Primary Colours ───────────────────────────────────────────────────────
[colors.primary]
background = "#282c34"
foreground = "#9cdef2"

# ── Normal Palette (ANSI) ────────────────────────────────────────────────
[colors.normal]
black   = "#2e3440"
red     = "#e06c75"
green   = "#9cdef2"
yellow  = "#e5c07b"
blue    = "#61afef"
magenta = "#c678dd"
cyan    = "#9cdef2"
white   = "#828997"

# ── Font Settings ────────────────────────────────────────────────────────
[font]
size = 11.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style  = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style  = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style  = "Bold Italic"

# ── Mouse & Environment ───────────────────────────────────────────────────
[mouse]
hide_when_typing = true

[env]
TERM = "xterm-256color"
